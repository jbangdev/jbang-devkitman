
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '17'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0

    - name: Build with Gradle Wrapper
      run: ./gradlew build

    - name: Upload allure results
      if: ${{ always() }}
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: allure-results-${{ matrix.os }}
        path: build/allure-results
        if-no-files-found: warn

  report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() }}
    permissions:
      contents: write

    steps:
    - name: Download all allure results
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
      with:
        path: allure-results
        pattern: allure-results-*

    - name: Install Allure CLI
      run: |
        curl -sSL https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.30.0/allure-commandline-2.30.0.zip -o allure-commandline.zip
        unzip -q allure-commandline.zip
        echo "$PWD/allure-2.30.0/bin" >> "$GITHUB_PATH"

    - name: Generate Allure reports
      run: |
        mkdir -p allure-report-files
        for results_dir in allure-results/allure-results-*; do
          [ -d "$results_dir" ] || continue
          os="${results_dir##*/allure-results-}"
          out_dir="allure-report-${os}"
          allure generate "$results_dir" --clean --single-file -o "$out_dir"
          mv "$out_dir/index.html" "allure-report-files/allure-report-${os}.html"
        done

    - name: Upload generated Allure HTML
      if: ${{ always() }}
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: allure-html-report
        path: allure-report-files/*.html
        if-no-files-found: warn

  dependency-submission:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '17'
        distribution: 'temurin'

    # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
    # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
      if: github.event_name != 'pull_request'
